<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaBuilder 🚀</title>
    
    <link rel="icon" href="data:,">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .preview-container { min-height: 500px; transition: all 0.3s ease; }
        .nova-bg {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }
        /* حركة نبض خفيفة للزرار عشان يشد الانتباه */
        @keyframes pulse-green {
            0% { shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
            100% { shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
        #whatsappBtn {
            box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7);
            animation: pulse-green 2s infinite;
        }
    </style>
</head>
<body class="nova-bg text-white min-h-screen">

    <div class="container mx-auto px-4 py-10">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-pink-500">
                NovaBuilder 🚀
            </h1>
            <p class="text-gray-400 text-lg">مستقبلك في بناء المواقع بذكاء خارق</p>
        </header>

        <div class="max-w-3xl mx-auto bg-gray-800/50 backdrop-blur-md p-6 rounded-2xl shadow-2xl border border-gray-700 mb-10">
            <textarea id="promptInput" 
                class="w-full bg-gray-900/80 text-white p-4 rounded-xl border border-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none resize-none h-32 mb-4"
                placeholder="صف الموقع الذي تتخيله... (مثال: متجر عطور فخم باللون الذهبي)"></textarea>
            
            <button id="generateBtn" 
                class="w-full bg-gradient-to-r from-blue-600 via-purple-600 to-blue-600 hover:scale-[1.02] text-white font-bold py-4 rounded-xl transition-all active:scale-95 flex items-center justify-center gap-3 shadow-lg shadow-blue-500/20">
                <span>ابدأ بناء مشروعك الآن ✨</span>
                <div id="loader" class="hidden animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></div>
            </button>
        </div>

        <div class="w-full">
            <h2 class="text-2xl font-bold mb-6 text-blue-400 flex items-center gap-3">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                منطقة المعاينة المباشرة:
            </h2>
            
            <div id="previewWrapper" class="bg-white rounded-2xl overflow-hidden shadow-2xl border-4 border-gray-800/50">
                <iframe id="previewIframe" class="w-full preview-container" srcdoc="<body style='display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:#888;background:#f9fafb;'><img src='https://cdn-icons-png.flaticon.com/512/1085/1085493.png' width='100' style='margin-bottom:20px; opacity:0.5'><p>اكتب وصفاً ودع NovaBuilder يبهرك!</p></body>"></iframe>
            </div>

            <div class="mt-8 flex flex-wrap justify-center gap-4">
                <button id="openNewTabBtn" 
                    class="hidden bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg flex items-center gap-3 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                    مشاهدة في نافذة أخرى 🌐
                </button>

                <button id="downloadBtn" 
                    class="hidden bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg flex items-center gap-3 active:scale-95 border border-pink-400/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    تحميل ملف HTML 📥
                </button>
            </div>
        </div>
    </div>

    <a href="https://wa.me/201229667161" target="_blank" id="whatsappBtn" 
       class="fixed bottom-6 left-6 z-50 bg-[#25D366] w-[60px] h-[60px] rounded-full shadow-2xl hover:scale-110 transition-all active:scale-95 group flex items-center justify-center overflow-hidden hover:w-[280px] duration-500">
        
        <div class="flex-shrink-0 flex items-center justify-center w-[60px]">
            <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="white" viewBox="0 0 24 24">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 .018 5.396.015 12.03c0 2.12.554 4.189 1.605 6.04L0 24l6.117-1.605a11.8 11.8 0 005.925 1.585h.005c6.635 0 12.032-5.396 12.035-12.032a11.761 11.761 0 00-3.53-8.502z"/>
            </svg>
        </div>

        <span class="text-white font-bold opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap pr-4">تواصل مع NovaCore Studio</span>
    </a>

    <script src="app.js"></script>
</body>
</html>
