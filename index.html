<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaBuilder 🚀</title>
    
    <link rel="icon" href="data:,">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .preview-container { min-height: 500px; transition: all 0.3s ease; }
        .nova-bg {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
        #whatsappBtn {
            animation: pulse-green 2s infinite;
        }
        /* ستايل المعاينة عشان نضمن إن الصورة تظهر بوضوح */
        #imagePreview { 
            max-height: 100px; 
            max-width: 150px;
            object-fit: cover; 
            display: block;
        }
    </style>
</head>
<body class="nova-bg text-white min-h-screen">

    <div class="container mx-auto px-4 py-10">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-pink-500">
                NovaBuilder 🚀
            </h1>
            <p class="text-gray-400 text-lg">مستقبلك في بناء المواقع بذكاء خارق</p>
        </header>

        <div class="max-w-3xl mx-auto bg-gray-800/50 backdrop-blur-md p-6 rounded-2xl shadow-2xl border border-gray-700 mb-10">
            <textarea id="promptInput" 
                class="w-full bg-gray-900/80 text-white p-4 rounded-xl border border-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none resize-none h-32 mb-4"
                placeholder="صف الموقع الذي تتخيله... أو ارفع صورة ليحللها الذكاء الاصطناعي!"></textarea>
            
            <div class="flex items-center gap-4 mb-4">
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <button type="button" onclick="document.getElementById('imageInput').click()" 
                    class="bg-gray-700 hover:bg-gray-600 text-sm py-2 px-4 rounded-lg flex items-center gap-2 transition-all border border-gray-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    ارفع صورة للتصميم 🎨
                </button>

                <div id="imagePreviewContainer" class="hidden relative">
                    <img id="imagePreview" src="" alt="Preview" class="rounded-lg border-2 border-blue-500 shadow-lg">
                    <button type="button" id="removeImage" class="absolute -top-2 -right-2 bg-red-500 rounded-full p-1 hover:bg-red-600 shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="white">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <button id="generateBtn" 
                class="w-full bg-gradient-to-r from-blue-600 via-purple-600 to-blue-600 hover:scale-[1.02] text-white font-bold py-4 rounded-xl transition-all active:scale-95 flex items-center justify-center gap-3 shadow-lg shadow-blue-500/20">
                <span>ابدأ بناء مشروعك الآن ✨</span>
                <div id="loader" class="hidden animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></div>
            </button>
        </div>

        <div class="w-full">
            <h2 class="text-2xl font-bold mb-6 text-blue-400 flex items-center gap-3">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                منطقة المعاينة المباشرة:
            </h2>
            
            <div id="previewWrapper" class="bg-white rounded-2xl overflow-hidden shadow-2xl border-4 border-gray-800/50">
                <iframe id="previewIframe" class="w-full preview-container" srcdoc="<body style='display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:#888;background:#f9fafb;'><img src='https://cdn-icons-png.flaticon.com/512/1085/1085493.png' width='100' style='margin-bottom:20px; opacity:0.5'><p>يبهرك NovaBuilder اكتب وصفا او ارفع صورة ودع</p></body>"></iframe>
            </div>

            <div class="mt-8 flex flex-wrap justify-center gap-4">
                <button id="openNewTabBtn" 
                    class="hidden bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg flex items-center gap-3 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                    مشاهدة في نافذة أخرى 🌐
                </button>

                <button id="downloadBtn" 
                    class="hidden bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg flex items-center gap-3 active:scale-95 border border-pink-400/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    تحميل ملف HTML 📥
                </button>
            </div>
        </div>
    </div>

    <a href="https://wa.me/201229667161?text=أهلاً NovaCore Studio" target="_blank" id="whatsappBtn" 
       class="fixed bottom-6 left-6 z-50 bg-[#25D366] flex items-center rounded-full shadow-2xl hover:scale-105 transition-all duration-500 group overflow-hidden h-[60px] w-[60px] hover:w-[280px]">
        <div class="w-[60px] h-[60px] flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="white" viewBox="0 0 16 16">
                <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
            </svg>
        </div>
        <span class="text-white font-bold opacity-0 group-hover:opacity-100 transition-opacity duration-300 pr-2 whitespace-nowrap">تواصل مع NovaCore Studio</span>
    </a>

    <script src="app.js"></script>
</body>
</html>
