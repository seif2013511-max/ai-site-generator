<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤلف المواقع الذكي</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        iframe {
            width: 100%;
            height: 500px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
        }
        /* Loader بسيط عشان وقت التحميل */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-5xl mx-auto p-6 md:p-12">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-blue-600 mb-3">صانع المواقع بالذكاء الاصطناعي 🚀</h1>
            <p class="text-slate-500 text-lg font-medium">اكتب وصف الموقع الذي تريده وسأقوم ببنائه فوراً</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <div class="flex flex-col gap-5">
                <textarea id="userPrompt" rows="4" 
                    class="w-full p-4 border-2 border-slate-100 rounded-xl outline-none focus:border-blue-400 text-lg transition-all"
                    placeholder="اكتب وصف الموقع هنا..."></textarea>
                
                <button onclick="generateSite()" id="genBtn" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-xl shadow-lg active:scale-95 transition-all">
                    توليد الموقع الآن ✨
                </button>
            </div>
        </div>

        <div id="status" class="hidden text-center mb-6">
            <div class="loader"></div>
            <span class="text-blue-600 font-bold mr-3">جاري التصميم.. من فضلك انتظر</span>
        </div>

        <div class="w-full">
            <h2 class="text-xl font-bold mb-4 text-slate-800">معاينة الموقع:</h2>
            <iframe id="preview" srcdoc="<div style='display:flex;justify-content:center;align-items:center;height:100%;font-family:sans-serif;color:#94a3b8;direction:rtl;'><h2>اكتب الوصف واضغط توليد...</h2></div>"></iframe>
            
            <div id="shareLink" class="mt-8 text-center hidden">
                <div class="bg-green-50 border-2 border-green-200 p-6 rounded-2xl shadow-sm">
                    <p class="text-green-700 mb-4 font-bold text-lg">مبروك! الموقع جاهز للمعاينة الكاملة 🎉</p>
                    <a id="siteLink" href="#" target="_blank" 
                       class="inline-flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white font-black py-4 px-10 rounded-xl shadow-xl hover:scale-105 transition-all">
                       <span>🔗 افتح الموقع في صفحة جديدة</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
