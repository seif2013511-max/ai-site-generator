<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صانع المواقع الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen p-10">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg text-center">
        <h1 class="text-3xl font-bold mb-6">🚀 صانع المواقع بالذكاء الاصطناعي</h1>
        <textarea id="userPrompt" class="w-full p-4 border rounded-lg mb-4" placeholder="وصف الموقع اللي في خيالك..."></textarea>
        <button id="genBtn" onclick="generateSite()" class="bg-blue-600 text-white px-8 py-3 rounded-lg hover:bg-blue-700 w-full transition font-bold">توليد الموقع الآن ✨</button>
        <div class="mt-10 text-right">
            <h2 class="text-xl font-bold mb-4">معاينة الموقع:</h2>
            <iframe id="preview" class="w-full h-96 border-2 border-dashed rounded-lg bg-gray-50"></iframe>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
