<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaBuilder 🚀</title>
    
    <link rel="icon" href="data:,">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .preview-container { min-height: 500px; transition: all 0.3s ease; }
        .nova-bg {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }
    </style>
</head>
<body class="nova-bg text-white min-h-screen">

    <div class="container mx-auto px-4 py-10">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-pink-500">
                NovaBuilder 🚀
            </h1>
            <p class="text-gray-400 text-lg">مستقبلك في بناء المواقع بذكاء خارق</p>
        </header>

        <div class="max-w-3xl mx-auto bg-gray-800/50 backdrop-blur-md p-6 rounded-2xl shadow-2xl border border-gray-700 mb-10">
            <textarea id="promptInput" 
                class="w-full bg-gray-900/80 text-white p-4 rounded-xl border border-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none resize-none h-32 mb-4"
                placeholder="صف الموقع الذي تتخيله... (مثال: متجر عطور فخم باللون الذهبي)"></textarea>
            
            <button id="generateBtn" 
                class="w-full bg-gradient-to-r from-blue-600 via-purple-600 to-blue-600 hover:scale-[1.02] text-white font-bold py-4 rounded-xl transition-all active:scale-95 flex items-center justify-center gap-3 shadow-lg shadow-blue-500/20">
                <span>ابدأ بناء مشروعك الآن ✨</span>
                <div id="loader" class="hidden animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></div>
            </button>
        </div>

        <div class="w-full">
            <h2 class="text-2xl font-bold mb-6 text-blue-400 flex items-center gap-3">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                منطقة المعاينة المباشرة:
            </h2>
            
            <div id="previewWrapper" class="bg-white rounded-2xl overflow-hidden shadow-2xl border-4 border-gray-800/50">
                <iframe id="previewIframe" class="w-full preview-container" srcdoc="<body style='display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:#888;background:#f9fafb;'><img src='https://cdn-icons-png.flaticon.com/512/1085/1085493.png' width='100' style='margin-bottom:20px; opacity:0.5'><p>اكتب وصفاً ودع NovaBuilder يبهرك!</p></body>"></iframe>
            </div>

            <div class="mt-8 flex justify-center">
                <button id="openNewTabBtn" 
                    class="hidden bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 px-10 rounded-xl transition-all shadow-lg flex items-center gap-3 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                    مشاهدة الموقع في نافذة اخرى 🌐
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
