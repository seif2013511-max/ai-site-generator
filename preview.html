<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaBuilder 🚀</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background: #0f172a; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            background: white; 
        }
    </style>
</head>
<body>
    <iframe id="output"></iframe>

    <script>
        function updateContent() {
            // 1. قراءة الـ ID من رابط الصفحة (URL)
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');

            if (projectId) {
                // 2. سحب الكود الخاص بهذا المشروع فقط
                const code = localStorage.getItem(projectId);
                
                if (code) {
                    document.getElementById('output').srcdoc = code;
                    document.title = "NovaBuilder 🚀 - " + projectId;
                } else {
                    document.body.innerHTML = "<h2 style='color:white; text-align:center; margin-top:20%;'>عفواً، الكود غير موجود أو تم مسحه.</h2>";
                }
            } else {
                // لو الصفحة اتفتحت من غير ID خالص (الطريقة القديمة)
                const legacyCode = localStorage.getItem('nova_preview_code');
                if (legacyCode) {
                    document.getElementById('output').srcdoc = legacyCode;
                }
            }
        }

        // التحديث عند الفتح
        updateContent();
        
        // مراقبة التغييرات (لو عملت توليد جديد لنفس المشروع والصفحة مفتوحة)
        window.addEventListener('storage', (e) => {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            
            if (e.key === projectId) {
                updateContent();
            }
        });
    </script>
</body>
</html>
