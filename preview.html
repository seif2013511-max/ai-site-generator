<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaBuilder 🚀</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background: #0f172a; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            background: white; 
        }
    </style>
</head>
<body>
    <iframe id="output"></iframe>

    <script>
        function updateContent() {
            // سحب الكود المخزن
            const code = localStorage.getItem('nova_preview_code');
            // سحب العنوان (اللي ثبتناه في app.js على NovaBuilder)
            const title = localStorage.getItem('nova_preview_title');
            
            if (code) {
                document.getElementById('output').srcdoc = code;
            }
            
            // تحديث عنوان التاب
            if (title) {
                document.title = title;
            } else {
                document.title = "NovaBuilder 🚀";
            }
        }

        // التحديث عند الفتح
        updateContent();
        
        // التحديث التلقائي في حالة تغيير الكود والصفحة مفتوحة
        window.addEventListener('storage', (e) => {
            if (e.key === 'nova_preview_code' || e.key === 'nova_preview_title') {
                updateContent();
            }
        });
    </script>
</body>
</html>
